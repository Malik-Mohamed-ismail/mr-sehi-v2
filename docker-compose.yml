version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mrsehi
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: mr_sehi_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrsehi -d mr_sehi_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://mrsehi:supersecretpassword@db:5432/mr_sehi_db
      - JWT_SECRET=change_this_to_a_minimum_64_character_long_secure_random_string_in_production
      - COOKIE_SECRET=change_this_to_a_minimum_32_character_long_string
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:80
      - LOG_LEVEL=info
      - CRON_TIMEZONE=Asia/Riyadh
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
